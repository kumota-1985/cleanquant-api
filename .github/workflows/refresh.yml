name: Refresh data

on:
  schedule:
    - cron: "0 6 * * 1"        # 毎週月曜 06:00 UTC に自動実行
  workflow_dispatch: {}          # 手動実行も可(Actionsタブの Run workflow)

permissions:
  contents: write                # data/ を commit & push するため

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install pandas pyarrow

      - name: Refresh datasets from public sources
        run: python refresh_data.py

      - name: Commit & push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: weekly data refresh [skip ci]"
            git push
          fi
